name: covid_epidemiological_intelligence
description: "Semantic model for COVID-19 epidemiological data enabling natural-language querying
  of outbreak trends, per-capita burden, demographic enrichment, and ML forecast accuracy
  across 11 countries. Used by Cortex Analyst (chat_bi_app.py)."

tables:
  - name: COVID_FEATURES
    description: "7-day smoothed COVID-19 confirmed case counts and doubling ratios per country
      and date. Source: Starschema COVID-19 Epidemiological Data (Snowflake Marketplace)."
    base_table:
      database: HACKATHON
      schema: DATA
      table: COVID_FEATURES

    dimensions:
      - name: country
        expr: COUNTRY
        description: "Country name. One of: United States, India, Brazil, France, Japan,
          Italy, United Kingdom, Germany, Spain, Canada, South Korea."
        type: string
        unique: false

      - name: date
        expr: DATE
        description: "Reporting date of the observation."
        type: date

    measures:
      - name: smoothed_daily_cases
        expr: SMOOTHED_CASES
        description: "7-day rolling average of confirmed daily COVID-19 cases. Suppresses
          weekend reporting noise."
        default_aggregation: avg

      - name: doubling_ratio
        expr: DOUBLING_RATIO
        description: "Ratio of current 7-day smoothed cases to cases from 7 days prior.
          Above 1.15 = HIGH RISK. 1.02 to 1.15 = MODERATE RISK. Below 1.02 = LOW RISK."
        default_aggregation: avg

  - name: POLICY_CORRELATION_MATRIX
    description: "COVID epidemiological features enriched with population, world region, and
      World Bank income group context. Includes per-capita case burden for fair cross-country
      comparison. Source: COVID_FEATURES LEFT JOIN COUNTRY_DEMOGRAPHICS."
    base_table:
      database: HACKATHON
      schema: DATA
      table: POLICY_CORRELATION_MATRIX

    dimensions:
      - name: country
        expr: COUNTRY
        description: "Country name."
        type: string

      - name: date
        expr: DATE
        description: "Reporting date."
        type: date

      - name: region
        expr: REGION
        description: "World region. Values: North America, Europe, Asia, South America."
        type: string

      - name: income_group
        expr: INCOME_GROUP
        description: "World Bank income classification. Values: High Income,
          Upper Middle Income, Lower Middle Income."
        type: string

    measures:
      - name: cases_per_million
        expr: CASES_PER_MILLION
        description: "Smoothed daily confirmed cases per million population.
          Normalised burden metric eliminating population-size bias."
        default_aggregation: avg

      - name: population
        expr: POPULATION
        description: "Country population (millions)."
        default_aggregation: max

      - name: doubling_ratio
        expr: DOUBLING_RATIO
        description: "Case doubling ratio vs 7 days ago."
        default_aggregation: avg

  - name: COVID_MODEL_METRICS
    description: "SNOWFLAKE.ML.FORECAST model evaluation metrics per country series.
      Generated by covid_forecast_model!SHOW_EVALUATION_METRICS()."
    base_table:
      database: HACKATHON
      schema: DATA
      table: COVID_MODEL_METRICS

    dimensions:
      - name: series
        expr: SERIES
        description: "Country name. Matches COVID_FEATURES.COUNTRY."
        type: string
        unique: true

    measures:
      - name: mean_mape
        expr: MEAN_MAPE
        description: "Mean Absolute Percentage Error expressed as a decimal (0.05 = 5%).
          Lower values indicate higher forecast accuracy."
        default_aggregation: avg

      - name: mean_wape
        expr: MEAN_WAPE
        description: "Mean Weighted Absolute Percentage Error."
        default_aggregation: avg
